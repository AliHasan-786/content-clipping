# Faceless Clip Pipeline configuration.
# All tunables live here. Edit values, not code.

niche: "Funny and viral moments across streamers, gaming, sports, pop culture, and internet culture"

source:
  # How far back to look when polling each source.
  lookback_hours: 36
  # Maximum number of source candidates to consider per run (after dedup + rank).
  max_candidates: 12

trend:
  enabled: true
  # Trend opportunities are ideas/safe-source leads, not automatic reposts.
  # They still require review before rendering/posting.
  lookback_hours: 24
  max_opportunities: 30
  reddit_limit_per_source: 15
  min_trend_score: 72
  reddit_min_upvotes: 2500
  reddit_min_comments: 150
  reddit_min_velocity: 350
  allow_reddit_rss_fallback: false
  # Safe-by-default formats. These can become screenshot/commentary cards.
  allowed_source_kinds:
    - official_clip
    - licensed_clip
    - public_domain_clip
    - creator_owned_clip
    - social_text
    - reddit_discussion
    - news_article
  # Interesting, but owner must confirm rights/context before use.
  review_required_source_kinds:
    - streamer_clip
    - movie_clip
    - sports_highlight
    - concert_clip
    - random_video
    - viral_clip
    - reddit_linked_video
    - clipping_account_repost
  # Never queue these for reposting.
  blocked_source_kinds:
    - independent_creator_repost
    - raw_tiktok_repost
    - private_person_video
  screenshot_card:
    default_music_bed: "generated_ambient_bed"
    duration_seconds: 12
    require_visible_attribution: true
    max_text_chars: 420
    include_vo: false

ai:
  enabled: true
  # Optional Anthropic enrichments. The pipeline still works without a key.
  trend_triage: true
  source_finding: true
  comment_mining: true
  dashboard_assist: true
  caption_variants: true
  safety_review: true
  scheduling: true
  model_fast: "claude-sonnet-4-6"
  model_deep: "claude-opus-4-7"

integrations:
  # Optional external AI/video tools. Keep the local ffmpeg renderer as the
  # default; enable one of these only when it saves time or improves output.
  providers:
    palmier_pro:
      enabled: false
      mcp_url: "http://127.0.0.1:19789/mcp"
    descript:
      enabled: false
    shotstack:
      enabled: false
    creatomate:
      enabled: false
    json2video:
      enabled: false
    runway:
      enabled: false
    ayrshare:
      enabled: false

ingest:
  # How many of the top-ranked candidates to actually download + transcribe per run.
  max_daily_ingest: 5
  # yt-dlp format selector. Capping at 1080p keeps disk + transcode cost sane.
  yt_dlp_format: "bestvideo[height<=1080]+bestaudio/best[height<=1080]"
  # Auto-purge downloads older than this.
  download_retention_hours: 48
  # faster-whisper model — "small" is a good cost/speed/quality default on Apple Silicon.
  whisper_model: "small"
  whisper_device: "auto"          # "auto" | "cpu" | "cuda"
  whisper_compute_type: "auto"    # "auto" | "int8" | "int8_float16" | "float16" | "float32"

scout:
  model: "claude-opus-4-7"
  max_clips_per_source: 2
  min_virality_score: 70
  min_clip_seconds: 20
  max_clip_seconds: 60
  visual_frames:
    enabled: true
    max_frames: 4

cut:
  width: 1080
  height: 1920
  fps: 30
  # Smart-crop: try to keep faces / motion centered. Fallback to center crop.
  smart_crop: true
  hook_card_seconds: 0.5
  # ASS caption styling.
  caption_font: "Inter"
  caption_size: 90
  caption_outline: 4
  # Ducking: dB attenuation applied to source audio under VO.
  duck_db: -14

tts:
  # "piper" (local, free) | "elevenlabs" (premium)
  backend: "piper"
  piper_voice_model: "en_US-amy-medium.onnx"
  elevenlabs_model: "eleven_turbo_v2_5"

package:
  model: "claude-sonnet-4-6"
  hashtags:
    youtube_count: 5
    tiktok_count: 5
    instagram_count: 12

post:
  youtube:
    enabled: true
    privacy_status: "public"   # "public" | "unlisted" | "private"
    category_id: "24"           # 24 = Entertainment; 28 = Science & Tech
    made_for_kids: false
  instagram:
    enabled: true
  tiktok:
    enabled: true
    # Until the app is audited, leave direct_post false — drafts only.
    direct_post: false
    privacy_level: "SELF_ONLY"  # SELF_ONLY | MUTUAL_FOLLOW_FRIENDS | PUBLIC_TO_EVERYONE
    disable_duet: false
    disable_stitch: false
    disable_comment: false

dashboard:
  host: "127.0.0.1"
  port: 8765
